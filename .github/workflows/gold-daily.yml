      - uses: actions/upload-artifact@v4
        with:
          name: gold-article-${{ github.run_id }}
          path: |
            daily_output/*.md
            daily_output/*.html
            auto_daily/latest_data.json
          retention-days: 7

      - name: ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ÚšÅēÝļïŋ―ïŋ―ïŋ―
        if: ${{ github.event.inputs.push_draft == 'true' }}
