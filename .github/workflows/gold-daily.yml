name: 黄金日更文章生成

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      push_draft:
        description: "是否推送至公众号草稿箱"
        type: boolean
        default: false

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  generate:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        working-directory: auto_daily
        run: npm ci

      - name: 安装 Playwright 浏览器
        working-directory: auto_daily
        run: npx playwright install chromium

      - name: 创建输出目录
        run: New-Item -ItemType Directory -Force -Path daily_output | Out-Null

      - name: 第1步：抓取数据
        working-directory: auto_daily
        run: node fetch_data.mjs

      - name: 第2步：生成文章
        working-directory: auto_daily
        run: node generate_article.mjs

      - name: 归档文章文件
        uses: actions/upload-artifact@v4
        with:
          name: gold-article-${{ github.run_id }}
          path: |
            daily_output/*.md
            daily_output/*.html
            auto_daily/latest_data.json
          retention-days: 7

            - name: 生成封面图
        if: ${{ github.event.inputs.push_draft == 'true' }}
        working-directory: auto_daily
        run: |
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(900, 500)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.SmoothingMode = "HighQuality"
          $brush1 = New-Object System.Drawing.Drawing2D.LinearGradientBrush((New-Object System.Drawing.Point(0,0)), (New-Object System.Drawing.Point(900,500)), [System.Drawing.Color]::FromArgb(15,25,35), [System.Drawing.Color]::FromArgb(26,39,64))
          $g.FillRectangle($brush1, 0, 0, 900, 500)
          $g.DrawLine((New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(200,150,62), 2)), 0, 490, 900, 490)
          $font = New-Object System.Drawing.Font("Microsoft YaHei", 36, [System.Drawing.FontStyle]::Bold)
          $tb = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(226,176,74))
          $sf = New-Object System.Drawing.StringFormat; $sf.Alignment = "Center"; $sf.LineAlignment = "Center"
          $g.DrawString("技术析金", $font, $tb, (New-Object System.Drawing.RectangleF(40,140,820,120)), $sf)
          $font2 = New-Object System.Drawing.Font("Microsoft YaHei", 18)
          $tb2 = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(180,190,200))
          $g.DrawString("黄金价格今日金价深度分析", $font2, $tb2, (New-Object System.Drawing.RectangleF(40,260,820,60)), $sf)
          $g.DrawString((Get-Date -Format "yyyy年M月d日"), (New-Object System.Drawing.Font("Microsoft YaHei",14)), (New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(120,130,140))), (New-Object System.Drawing.RectangleF(40,320,820,40)), $sf)
          $bmp.Save("cover.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose(); $bmp.Dispose()
          Write-Host "封面图已生成"

- name: 推送至公众号草稿箱
        if: ${{ github.event.inputs.push_draft == 'true' }}
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
        working-directory: auto_daily
        run: node push_wechat.mjs

      - name: 提交历史数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if (Test-Path auto_daily/price_history.json) {
            Copy-Item auto_daily/price_history.json auto_daily/price_history.json.bak
            git add -f auto_daily/price_history.json
            git commit -m "?? 更新黄金历史价格数据 [skip ci]"
            git push
          } else {
            Write-Host "price_history.json 不存在，跳过提交"
          }