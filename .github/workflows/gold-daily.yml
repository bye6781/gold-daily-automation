        with:
          node-version: 20

      - name: ïŋ―ïŋ―Ũ°ïŋ―ïŋ―ïŋ―ïŋ―
        working-directory: auto_daily
        run: npm ci

      - name: ïŋ―ïŋ―Ũ° Playwright
        working-directory: auto_daily
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: ŨĨČĄïŋ―ïŋ―ïŋ―ïŋ―
        working-directory: auto_daily
        run: node fetch_data.mjs

      - name: ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―
        working-directory: auto_daily
        run: node generate_article.mjs

      - name: ïŋ―ïŋ―ïŋ―É·ïŋ―ïŋ―ïŋ―Íž
        if: ${{ github.event.inputs.push_draft == 'true' }}
        working-directory: auto_daily
