name: 黄金日更文章生成

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      push_draft:
        description: "是否推送至公众号草稿箱"
        type: boolean
        default: false

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  generate:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        working-directory: auto_daily
        run: npm ci

      - name: 安装 Playwright 浏览器
        working-directory: auto_daily
        run: npx playwright install chromium

      - name: 创建输出目录
        run: New-Item -ItemType Directory -Force -Path daily_output | Out-Null

      - name: 第1步：抓取数据
        working-directory: auto_daily
        run: node fetch_data.mjs

      - name: 第2步：生成文章
        working-directory: auto_daily
        run: node generate_article.mjs

      - name: 归档文章文件
        uses: actions/upload-artifact@v4
        with:
          name: gold-article-${{ github.run_id }}
          path: |
            daily_output/*.md
            daily_output/*.html
            auto_daily/latest_data.json
          retention-days: 7

      - name: 推送至公众号草稿箱
        if: ${{ github.event.inputs.push_draft == 'true' }}
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
        working-directory: auto_daily
        run: powershell -ExecutionPolicy Bypass -File push_wechat.ps1

      - name: 提交历史数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if (Test-Path auto_daily/price_history.json) {
            Copy-Item auto_daily/price_history.json auto_daily/price_history.json.bak
            git add -f auto_daily/price_history.json
            git commit -m "?? 更新黄金历史价格数据 [skip ci]"
            git push
          } else {
            Write-Host "price_history.json 不存在，跳过提交"
          }