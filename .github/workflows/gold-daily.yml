name: 黄金日更文章推送

on:
  repository_dispatch:
    types: [gold-daily]
  schedule:
    - cron: "0 0-2,22-23 * * *"
  workflow_dispatch:
    inputs:
      push_draft:
        description: "推送至草稿箱"
        type: boolean
        default: true
      force:
        description: "忽略今日已推送检查，强制重新生成"
        type: boolean
        default: false

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 检查今日是否已推送
        id: check
        run: |
          FORCE="${{ github.event.inputs.force || github.event.client_payload.force || 'false' }}"
          TODAY=$(TZ=Asia/Shanghai date +%Y%m%d)
          if [ "$FORCE" = "true" ]; then
            echo "强制模式，跳过日期检查"
            echo "skip=false" >> $GITHUB_OUTPUT
          elif [ -f "auto_daily/last_push_date" ] && [ "$(cat auto_daily/last_push_date)" = "$TODAY" ]; then
            echo "今日已推送，跳过"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 安装依赖
        if: steps.check.outputs.skip != 'true'
        working-directory: auto_daily
        run: npm ci

      - name: 安装 Playwright
        if: steps.check.outputs.skip != 'true'
        working-directory: auto_daily
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: 抓取数据
        if: steps.check.outputs.skip != 'true'
        working-directory: auto_daily
        run: node fetch_data.mjs

      - name: 生成文章
        if: steps.check.outputs.skip != 'true'
        working-directory: auto_daily
        run: node generate_article.mjs

      - name: 生成封面图
        if: steps.check.outputs.skip != 'true'
        working-directory: auto_daily
        run: node gen_cover.cjs

      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.skip != 'true'
        with:
          name: gold-article-${{ github.run_id }}
          path: |
            daily_output/*.md
            daily_output/*.html
            auto_daily/latest_data.json
          retention-days: 7

      - name: 推送至公众号草稿箱
        if: steps.check.outputs.skip != 'true'
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
        working-directory: auto_daily
        run: node push_wechat.cjs

      - name: 记录推送日期
        if: steps.check.outputs.skip != 'true'
        run: |
          TZ=Asia/Shanghai date +%Y%m%d > auto_daily/last_push_date

      - name: 提交记录
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f auto_daily/last_push_date ] || [ -f auto_daily/price_history.json ]; then
            [ -f auto_daily/price_history.json ] && cp auto_daily/price_history.json auto_daily/price_history.json.bak
            git add -f auto_daily/last_push_date auto_daily/price_history.json 2>/dev/null
            git commit -m "update [skip ci]" || echo "no change"
            git push || echo "push failed"
          fi