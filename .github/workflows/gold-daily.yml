          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
        working-directory: auto_daily
        run: node push_wechat.cjs

      - name: ïŋ―á―ŧïŋ―ïŋ―Ę·ïŋ―ïŋ―ïŋ―ïŋ―
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f auto_daily/price_history.json ]; then
            cp auto_daily/price_history.json auto_daily/price_history.json.bak
            git add -f auto_daily/price_history.json
            git commit -m "?? ïŋ―ïŋ―ïŋ―ÂŧÆ―ïŋ―ïŋ―ïŋ―Ę·ïŋ―Ûļïŋ―ïŋ―ïŋ―ïŋ―ïŋ― [skip ci]" || echo "ïŋ―ÞąäŧŊ"
            git push || echo "ïŋ―ïŋ―ïŋ―ïŋ―Ę§ïŋ―ïŋ―"
