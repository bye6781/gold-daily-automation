<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:900px;height:500px;overflow:hidden;font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;background:#121621;color:#e8ecf1}
.accent{position:absolute;left:0;width:100%;height:4px;background:#c89b3c}
.content{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
.brand{font-size:52px;font-weight:800;color:#e2b04a;letter-spacing:6px;margin-bottom:8px}
.divider{width:120px;height:1px;background:rgba(200,155,60,.5);margin:16px auto}
.sub{font-size:20px;color:#bec3cd;letter-spacing:2px;margin-bottom:20px}
.kw{font-size:14px;color:#8a909e;margin-bottom:28px}
.dt{font-size:16px;color:#bec3cd}
.ft{position:absolute;bottom:20px;left:0;width:100%;text-align:center;font-size:11px;color:#5a606e}
.dot{position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(200,155,60,.15)}
</style></head><body>
<div class="accent" style="top:0"></div><div class="accent" style="bottom:0"></div>
<div class="dot" style="top:60px;left:70px"></div><div class="dot" style="top:140px;left:70px"></div>
<div class="dot" style="top:60px;right:70px"></div><div class="dot" style="top:140px;right:70px"></div>
<div class="dot" style="bottom:60px;left:70px"></div><div class="dot" style="bottom:140px;left:70px"></div>
<div class="dot" style="bottom:60px;right:70px"></div><div class="dot" style="bottom:140px;right:70px"></div>
<div class="content">
<div class="brand">技术析金</div>
<div class="divider"></div>
<div class="sub">黄金 · 每日深度分析报告</div>
<div class="kw">实时金价 | 技术面解析 | 基本面研判 | 实物消费指南</div>
<div class="dt" id="date"></div>
</div>
<div class="ft">数据来源：金十数据 | 上海黄金交易所 | COMEX</div>
<script>document.getElementById('date').textContent=new Date().getFullYear()+'年'+(new Date().getMonth()+1)+'月'+new Date().getDate()+'日 更新'</script>
</body></html>
